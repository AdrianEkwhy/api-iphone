<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katalog iPhone</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
    }

    header {
      background: #111;
      color: white;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 24px;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
    }

    .hero {
      text-align: center;
      padding: 50px 20px;
      background: white;
    }

    .hero h2 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #666;
    }

    .catalog {
      padding: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 25px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 160px;
      height: 180px;
      object-fit: contain;
      margin-bottom: 20px;
    }

    .card h3 {
      margin: 10px 0;
      font-size: 20px;
    }

    .storage {
      color: #666;
      font-size: 14px;
    }

    .price {
      font-weight: bold;
      font-size: 18px;
      margin: 15px 0;
    }

    .stock {
      font-size: 13px;
      color: green;
      margin-bottom: 15px;
    }

    button {
      background: #0071e3;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #005bb5;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <header>
    <h1>iPhone Store</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Katalog</a>
      <a href="#">Keranjang</a>
      <a href="#">Login</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Katalog iPhone Terbaru</h2>
    <p>Pilih iPhone favoritmu dengan harga terbaik</p>
  </section>

  <section class="catalog" id="catalog"></section>

  <footer>
    © 2026 iPhone Store. All Rights Reserved.
  </footer>

  <script>
    const apiUrl = "http://localhost:8000/api/iphones";

    async function getIphones() {
      try {
        const response = await fetch(apiUrl, {
          headers: {
            "Accept": "application/json"
          }
        });

        const data = await response.json();
        const catalog = document.getElementById("catalog");

        catalog.innerHTML = "";

        data.forEach(item => {
          catalog.innerHTML += `
            <div class="card">
              <img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-pro-1.jpg" alt="iPhone">
              <h3>${item.nama}</h3>
              <p class="storage">${item.storage}</p>
              <p class="price">Rp ${Number(item.harga).toLocaleString("id-ID")}</p>
              <p class="stock">Stok: ${item.stok}</p>
              <button onclick="beliProduk(${item.id})">Beli Sekarang</button>
            </div>
          `;
        });

      } catch (error) {
        document.getElementById("catalog").innerHTML = `
          <p>Gagal mengambil data produk.</p>
        `;
      }
    }

    function beliProduk(id) {
      alert("Produk dengan ID " + id + " ditambahkan ke keranjang.");
    }

    getIphones();
  </script>

</body>
</html>
